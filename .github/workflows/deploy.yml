name: Build and Deploy App

on:
  push:
    branches: [main, homolog]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev
  IMAGE: oficina-mecanica-api

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm test || echo "Tests pending"

  docker-build-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and Push
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/oficina-registry/${{ env.IMAGE }}:${{ github.sha }} .
          docker build -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/oficina-registry/${{ env.IMAGE }}:latest .
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/oficina-registry/${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/oficina-registry/${{ env.IMAGE }}:latest

  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: docker-build-push
    environment: production
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: oficina-cluster
          location: us-central1-a

      - name: Deploy to GKE
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/oficina-registry/${{ env.IMAGE }}:${{ github.sha }}|g" k8s/app-deployment.yaml
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/app-deployment.yaml
          kubectl apply -f k8s/app-service.yaml
          kubectl apply -f k8s/hpa.yaml
          kubectl rollout status deployment/oficina-app -n oficina-mecanica --timeout=120s
